<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recovery Code — Resumify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ededed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background-color: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            text-align: center;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 12px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 13.5px;
            color: #a1a1aa;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .code-box-container {
            position: relative;
            margin: 24px 0;
        }

        .code-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            background-color: rgba(5, 5, 5, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            color: #fff;
            user-select: all;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.05);
            color: #a1a1aa;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
        }

        .btn-copy:hover:not(:disabled) {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-copy.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.2);
        }

        .warning-box {
            background-color: rgba(234, 179, 8, 0.05);
            border: 1px solid rgba(234, 179, 8, 0.15);
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            color: #eab308;
            margin-bottom: 24px;
            line-height: 1.5;
            text-align: left;
        }

        .warning-box p {
            margin-bottom: 4px;
        }
        
        .warning-box p:last-child {
            margin-bottom: 0;
        }

        .btn {
            width: 100%;
            padding: 12px 18px;
            background-color: #ededed;
            color: #000;
            border: 1px solid #ededed;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255,255,255,0.15);
        }

        .btn:hover:not(.disabled) {
            background-color: #fff;
            border-color: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(255,255,255,0.25);
        }

        .btn:active:not(.disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn.disabled {
            pointer-events: none;
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #3f3f46;
            color: #a1a1aa;
            border-color: #3f3f46;
            box-shadow: none;
        }

        .live-timer {
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 14px;
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Recovery Code</h2>
        <p class="subtitle">A secure recovery code has been generated for your account.</p>
        
        <div class="code-box-container">
            <div id="recovery-code" class="code-box">{{ code }}</div>
            <button id="copy-btn" class="btn-copy" onclick="copyCode()">Copy Code</button>
        </div>
        
        <div class="warning-box" id="timer-container">
            <p id="warning-msg">Save this code. It will never be shown again.</p>
            <p>Expires in: <span id="timer-text" class="live-timer">15:00</span></p>
        </div>
        
        <a href="{% url 'account_reset_password_confirm' %}" class="btn" id="continue-btn">Continue</a>
    </div>

    <script>
        let copied = false;
        function copyCode() {
            if (copied) return;
            var codeText = document.getElementById('recovery-code').innerText;
            navigator.clipboard.writeText(codeText).then(function() {
                var btn = document.getElementById('copy-btn');
                btn.innerText = '✓ Copied Successfully';
                btn.classList.add('success');
                copied = true;
                
                setTimeout(function() {
                    const codeEl = document.getElementById('recovery-code');
                    codeEl.innerText = '••••-••••';
                    codeEl.style.letterSpacing = '6px';
                    
                    btn.innerText = 'Code Secured';
                    btn.disabled = true;
                    btn.style.cursor = 'not-allowed';
                    btn.style.opacity = '0.5';
                    
                    const warningText = document.getElementById('warning-msg');
                    warningText.innerHTML = '<strong>This recovery code will never be shown again.</strong>';
                }, 2000);
            }).catch(function(err) {
                console.error('Could not copy text: ', err);
            });
        }

        let secondsRemaining = {{ expires_in_seconds|default:900 }};
        const timerText = document.getElementById('timer-text');
        const continueBtn = document.getElementById('continue-btn');
        const timerContainer = document.getElementById('timer-container');

        function updateTimer() {
            if (secondsRemaining <= 0) {
                timerContainer.innerHTML = '<strong style="color: #ef4444;">Recovery code expired.</strong><br>Generate a new recovery code.';
                continueBtn.classList.add('disabled');
                continueBtn.href = "{% url 'account_reset_password' %}";
                continueBtn.innerText = 'Request New Code';
                continueBtn.style.pointerEvents = 'auto'; // allow clicking request new code
                continueBtn.classList.remove('disabled'); // so they can click it to restart
                return;
            }
            
            const minutes = Math.floor(secondsRemaining / 60);
            const seconds = secondsRemaining % 60;
            const displayMin = String(minutes).padStart(2, '0');
            const displaySec = String(seconds).padStart(2, '0');
            timerText.innerText = `${displayMin}:${displaySec}`;
            
            secondsRemaining--;
            setTimeout(updateTimer, 1000);
        }
        
        updateTimer();
    </script>
</body>
</html>
