<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password — Resumify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ededed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background-color: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 12px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 13.5px;
            color: #a1a1aa;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #a1a1aa;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(5, 5, 5, 0.6);
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ededed;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: #666;
            background-color: rgba(10, 10, 10, 0.8);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
            transform: translateY(-1px);
        }

        .btn {
            width: 100%;
            padding: 12px 18px;
            margin-top: 8px;
            background-color: #ededed;
            color: #000;
            border: 1px solid #ededed;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255,255,255,0.15);
        }

        .btn:hover:not(:disabled) {
            background-color: #fff;
            border-color: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(255,255,255,0.25);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .links {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
        }

        .links a {
            color: #ededed;
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 500;
        }

        .links a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #a1a1aa;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #ededed;
        }
        
        .error-message {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="{% url 'account_login' %}" class="back-link">← Back to Login</a>
        
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your registered email address to generate a secure password recovery code.</p>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{% url 'account_reset_password' %}" id="reset-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com" autocomplete="off">
            </div>
            
            <button class="btn" type="submit" id="submit-btn">Generate Recovery Code</button>
        </form>
        
        <div class="links">
            Remembered your password? <a href="{% url 'account_login' %}">Log in</a>
        </div>
    </div>

    <script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Generating...';
        });
    </script>
</body>
</html>
