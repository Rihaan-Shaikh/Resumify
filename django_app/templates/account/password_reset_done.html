{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Sent — Resumify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ededed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background-color: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 48px;
            color: #10b981;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 16px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .msg-text {
            font-size: 14px;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-flex;
            width: 100%;
            padding: 12px 18px;
            background-color: #ededed;
            color: #000;
            border: 1px solid #ededed;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255,255,255,0.15);
        }

        .btn:hover {
            background-color: #fff;
            border-color: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(255,255,255,0.25);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="success-icon">✉</div>
        <h2>Reset Link Sent</h2>
        <p class="msg-text">We have sent a password reset link to your email address, if an account exists under the email address you provided. Please check your inbox (and spam folder) shortly.</p>
        
        <a href="{% url 'account_login' %}" class="btn">Return to Login</a>
    </div>

</body>
</html>
