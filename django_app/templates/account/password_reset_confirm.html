<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — Resumify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ededed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background-color: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            margin: 20px 0;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 13px;
            color: #a1a1aa;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #a1a1aa;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(5, 5, 5, 0.6);
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ededed;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: #666;
            background-color: rgba(10, 10, 10, 0.8);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
            transform: translateY(-1px);
        }

        .validation-checklist {
            list-style: none;
            margin: 16px 0;
            padding: 12px 16px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .validation-item {
            font-size: 12.5px;
            color: #71717a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
        }

        .validation-item:last-child {
            margin-bottom: 0;
        }

        .validation-item .status-icon {
            margin-right: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .validation-item.valid {
            color: #22c55e;
        }

        .validation-item.invalid {
            color: #ef4444;
        }

        .btn {
            width: 100%;
            padding: 12px 18px;
            background-color: #ededed;
            color: #000;
            border: 1px solid #ededed;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255,255,255,0.15);
        }

        .btn:hover:not(:disabled) {
            background-color: #fff;
            border-color: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(255,255,255,0.25);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #3f3f46;
            color: #a1a1aa;
            border-color: #3f3f46;
            box-shadow: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .links {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
        }

        .links a {
            color: #ededed;
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 500;
        }

        .links a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter the recovery code sent and set your new password.</p>
        
        {% if error %}
        <div class="error-message" id="backend-error">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{% url 'account_reset_password_confirm' %}" id="reset-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com" value="{{ email }}" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="code">Recovery Code</label>
                <input type="text" id="code" name="code" required placeholder="XXXX-XXXX" autocomplete="off" style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" required placeholder="••••••••" autocomplete="new-password">
            </div>

            <ul class="validation-checklist">
                <li id="req-length" class="validation-item">
                    <span class="status-icon">○</span> 8+ characters
                </li>
                <li id="req-uppercase" class="validation-item">
                    <span class="status-icon">○</span> Uppercase letter
                </li>
                <li id="req-lowercase" class="validation-item">
                    <span class="status-icon">○</span> Lowercase letter
                </li>
                <li id="req-number" class="validation-item">
                    <span class="status-icon">○</span> Number
                </li>
                <li id="req-special" class="validation-item">
                    <span class="status-icon">○</span> Special character
                </li>
                <li id="req-match" class="validation-item">
                    <span class="status-icon">○</span> Passwords Match
                </li>
            </ul>
            
            <button class="btn" type="submit" id="submit-btn" disabled>Reset Password</button>
        </form>
        
        <div class="links">
            Want to start over? <a href="{% url 'account_reset_password' %}">Request new code</a>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('password_confirm');
        const codeInput = document.getElementById('code');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('reset-form');

        // Automatically clean, uppercase and trim whitespaces in code field
        codeInput.addEventListener('input', function() {
            let start = this.selectionStart;
            let end = this.selectionEnd;
            this.value = this.value.toUpperCase().replace(/\s/g, '');
            this.setSelectionRange(start, end);
        });

        const reqs = {
            length: { el: document.getElementById('req-length'), test: val => val.length >= 8 },
            uppercase: { el: document.getElementById('req-uppercase'), test: val => /[A-Z]/.test(val) },
            lowercase: { el: document.getElementById('req-lowercase'), test: val => /[a-z]/.test(val) },
            number: { el: document.getElementById('req-number'), test: val => /[0-9]/.test(val) },
            special: { el: document.getElementById('req-special'), test: val => /[^A-Za-z0-9]/.test(val) },
            match: { el: document.getElementById('req-match'), test: (val, confirmVal) => val && val === confirmVal }
        };

        function validatePassword() {
            const val = passwordInput.value;
            const confirmVal = confirmInput.value;
            let allValid = true;

            for (const key in reqs) {
                const req = reqs[key];
                let isReqValid = false;
                if (key === 'match') {
                    isReqValid = req.test(val, confirmVal);
                } else {
                    isReqValid = req.test(val);
                }

                const icon = req.el.querySelector('.status-icon');
                if (isReqValid) {
                    req.el.className = 'validation-item valid';
                    icon.innerText = '✓';
                } else {
                    if (val || (key === 'match' && confirmVal)) {
                        req.el.className = 'validation-item invalid';
                        icon.innerText = '✗';
                    } else {
                        req.el.className = 'validation-item';
                        icon.innerText = '○';
                    }
                    allValid = false;
                }
            }

            submitBtn.disabled = !allValid;
        }

        passwordInput.addEventListener('input', validatePassword);
        confirmInput.addEventListener('input', validatePassword);

        form.addEventListener('submit', function(e) {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Resetting Password...';
        });
    </script>
</body>
</html>
